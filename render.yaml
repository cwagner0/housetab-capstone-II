services:
  - type: web
    name: housetab
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: housetab-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: "1"
      - key: RAILS_MAX_THREADS
        value: "3"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: BUNDLE_WITHOUT
        value: "development:test"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"

databases:
  - name: housetab-db
    plan: free
    databaseName: housetab
    user: housetab
